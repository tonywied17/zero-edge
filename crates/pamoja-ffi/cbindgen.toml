language = "C"
pragma_once = true
cpp_compat = true
documentation = true
documentation_style = "c99"
style = "type"
header = "/* pamoja C ABI. */"
autogen_warning = "/* Generated by cbindgen from crates/pamoja-ffi. Do not edit by hand; run `cargo build -p pamoja-ffi` to regenerate. */"

[parse]
# Only the curated surface in this crate is exported; core and capability types
# stay internal and are reached through the opaque handles defined here.
parse_deps = false

[enum]
prefix_with_name = true

[export]
item_types = ["enums", "structs", "opaque", "functions"]
