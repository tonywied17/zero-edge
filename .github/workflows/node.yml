name: node

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build and smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build native addon and facade
        run: npm run build

      - name: Check generated bindings are in sync with the Rust source
        run: |
          if ! git diff --exit-code -- index.js index.d.ts; then
            echo "::error::Generated bindings are stale. Run 'npm run build' in bindings/node and commit index.js and index.d.ts."
            exit 1
          fi

      - name: Smoke test
        run: npm test
