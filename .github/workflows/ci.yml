name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install components
        run: rustup component add rustfmt clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Build the no_std crates with their default features off, so the core stays
      # `no_std` (only `core` and `alloc`) and never silently regains a `std`
      # dependency that would break the microcontroller target.
      - name: no_std build
        run: cargo build --no-default-features -p pamoja-core -p pamoja-codec -p pamoja-security -p pamoja-audit -p pamoja-zenoh -p pamoja-ros2

      # The robotics helpers are opt-in but must also stay `no_std`, so build them
      # explicitly with their feature on (and `geo`, which the waypoint guidance needs).
      - name: no_std robotics build
        run: cargo build --no-default-features -p pamoja-kit --features "robotics geo"

      - name: Test
        run: cargo test --workspace

      # The dashboard's per-locale JSON bundles are the single source of translations;
      # this fails if a locale's keys or placeholders drift from English, if a bundle is
      # missing metadata, or if one grows past its gzipped footprint budget.
      - name: Dashboard i18n bundles valid
        run: cargo run -p xtask -- dashboard i18n --check

      # Each capability tier's page-load bundle must stay within its gzipped transfer budget,
      # so it loads fast over a weak hotspot link; this fails if any tier grows past it.
      - name: Dashboard footprint budget
        run: cargo run -p xtask -- dashboard footprint

      # The smallest tier embeds only the minimal floor page behind its own cfg; build it so
      # the tier feature and its embedded asset cannot rot under the default (full) build.
      - name: Dashboard Tier C build
        run: cargo build -p pamoja-dashboard --no-default-features --features "serve,tier-c"

      # Each crate's README is generated from its rustdoc; this fails if any is stale, so the
      # crates.io pages stay in sync with the code.
      - name: Crate READMEs in sync
        run: cargo run -p xtask -- docs --check

  ros-bridge:
    name: ros2 + zenoh bridge
    runs-on: ubuntu-latest
    # The live r2r/Zenoh bridge needs a ROS 2 install, so this job builds and tests the
    # opt-in `bridge`/`runtime` features inside the official ROS 2 image, with the Rust
    # toolchain layered on. The pure-logic halves are already covered by the `rust` job.
    container:
      image: ros:jazzy
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust and bridge dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ros-jazzy-rmw-zenoh-cpp ros-jazzy-example-interfaces build-essential pkg-config libclang-dev clang curl ca-certificates
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # The v2 suffix busts the cache after adding example_interfaces, so r2r rebuilds and
          # regenerates its message bindings against the newly installed ROS 2 packages.
          key: ${{ runner.os }}-ros-cargo-v2-${{ hashFiles('**/Cargo.toml') }}

      - name: Test the Zenoh transport and the ROS 2 bridge
        shell: bash
        run: |
          source "$HOME/.cargo/env"
          source /opt/ros/jazzy/setup.bash
          cargo test -p pamoja-zenoh --features runtime
          cargo test -p pamoja-ros2 --features bridge
