name: release-node

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zig: true
          # Cross-compiled on Apple Silicon: scarce macos-13 Intel runners sit
          # unallocated for minutes and stall the whole release.
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Setup zig for cross compilation
        if: matrix.zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npm run build:native -- --target ${{ matrix.target }} ${{ matrix.zig && '--zig' || '' }}

      - name: Upload addon artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Download addon artifacts
        uses: actions/download-artifact@v8
        with:
          path: bindings/node/artifacts

      - name: Move addons into platform packages
        run: npx napi artifacts --dir artifacts

      - name: Publish platform packages and the root package
        run: |
          npx napi prepublish -t npm --skip-gh-release
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
