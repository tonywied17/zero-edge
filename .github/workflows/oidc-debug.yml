name: oidc-debug

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  claims:
    name: print OIDC claims
    runs-on: ubuntu-latest
    steps:
      - name: Print the OIDC claims for the NuGet audience
        run: |
          token=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://www.nuget.org" | jq -r '.value')
          payload=$(echo "$token" | cut -d. -f2 | tr '_-' '/+')
          while [ $(( ${#payload} % 4 )) -ne 0 ]; do payload="${payload}="; done
          echo "$payload" | base64 -d | jq '{
            sub,
            repository,
            repository_owner,
            repository_id,
            repository_owner_id,
            workflow_ref,
            job_workflow_ref,
            ref,
            environment
          }'
